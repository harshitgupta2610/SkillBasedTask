<div class="container" style="max-width: 450px; margin-top: 60px;">
  <div class="card shadow-sm">
    <div class="card-header bg-success text-white text-center">
      <h4 class="mb-0">Create Account</h4>
    </div>
    <div class="card-body">
      <h6 class="text-center text-muted mb-4">Join SkillTask</h6>

      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

      <form (ngSubmit)="onRegister()">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" [(ngModel)]="name" name="name" required>
          <div class="error" *ngIf="fieldErrors['name']">{{ fieldErrors['name'] }}</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" [(ngModel)]="email" name="email" required>
          <div class="error" *ngIf="fieldErrors['email']">{{ fieldErrors['email'] }}</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Role</label>
          <select class="form-select" [(ngModel)]="role" name="role">
            <option value="EMPLOYEE">Employee</option>
            <option value="MANAGER">Manager</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" [(ngModel)]="password" name="password" required>
          <div class="error" *ngIf="fieldErrors['password']">{{ fieldErrors['password'] }}</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" [(ngModel)]="confirmPw" name="confirmPw" required>
          <div class="error" *ngIf="fieldErrors['confirmPw']">{{ fieldErrors['confirmPw'] }}</div>
        </div>

        <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
          {{ loading ? 'Creating account...' : 'Sign Up' }}
        </button>
      </form>

      <p class="text-center mt-3 mb-0">
        Already have an account? <a routerLink="/login">Login</a>
      </p>
    </div>
  </div>
</div>
